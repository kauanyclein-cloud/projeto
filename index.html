<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Blog Tech</title>
    
    <style>
        /* O CSS fica sempre dentro da tag <style> no head */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #183C63;
            color: #FFFFFF;
            text-align: center;
            padding: 20px 0;
        }

        main {
            background-color: #FFFFFF;
            color: #183C63;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 8px;
        }

        .post {
            margin-top: 20px;
            border-top: 1px solid #183C63;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Meu blog tech</h1>
        <p>Vou compartilhar conhecimentos sobre tecnologia e programação</p>
    </header>

    <main>
        <section class="post">
            <h2>Meu primeiro post</h2>
            <p><strong>Por:</strong> Kauany Clein</p>
            <p>Boas-vindas ao meu novo blog! Aqui vou compartilhar dicas de programação e curiosidades da área de tecnologia.</p>
        </section>
    </main>

</body>
</html>
